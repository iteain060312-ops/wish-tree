<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>염원을 모은 쪽지들</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#08060a; overflow:hidden; font-family:'Noto Serif KR',serif; -webkit-font-smoothing:antialiased; }
canvas { position:fixed; inset:0; width:100%; height:100%; cursor:pointer; }

.header { position:fixed; top:24px; left:28px; z-index:10; pointer-events:none; }
.htitle { font-size:15px; font-weight:300; letter-spacing:.2em; color:rgba(255,255,255,.45); }
.hcount { font-size:10px; letter-spacing:.14em; color:rgba(255,255,255,.2); margin-top:5px; }
.hint { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:.18em; color:rgba(255,255,255,.14); pointer-events:none; z-index:10; white-space:nowrap; }

/* 하단 타이포 */
.typo-bottom {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  z-index:10; pointer-events:none;
  opacity:0.45;
}
.typo-bottom img {
  height:clamp(28px, 4vw, 48px);
  width:auto; display:block;
}

/* 팝업 */
.overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0); display:flex; align-items:center; justify-content:center; pointer-events:none; transition:background .4s; }
.overlay.on { background:rgba(0,0,0,.82); pointer-events:auto; }
.card {
  position:relative; width:min(340px,80vw);
  background:#c4a466;
  padding:40px 32px 32px;
  transform:translateY(14px) scale(.97) rotate(-1.5deg); opacity:0;
  transition:all .48s cubic-bezier(.16,1,.3,1);
  box-shadow:4px 8px 32px rgba(0,0,0,.7);
}
.overlay.on .card { transform:rotate(-1.5deg) scale(1); opacity:1; }

/* 쪽지 접힌 선 장식 */
.card::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(0,0,0,.04) 26px,rgba(0,0,0,.04) 27px);
  pointer-events:none;
}
.card-x { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.card-x svg { width:100%; height:100%; }
.card-fold { position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 26px 26px 0; border-color:transparent rgba(0,0,0,.22) transparent transparent; }
.card-fold::after { content:''; position:absolute; top:1px; right:-25px; width:0; height:0; border-style:solid; border-width:0 24px 24px 0; border-color:transparent rgba(155,115,55,.55) transparent transparent; }

.card-close { position:absolute; top:10px; right:12px; font-size:14px; color:rgba(55,35,8,.32); cursor:pointer; font-family:sans-serif; z-index:1; transition:color .2s; }
.card-close:hover { color:rgba(55,35,8,.65); }
.card-date { font-family:'Noto Sans KR',sans-serif; font-size:9px; letter-spacing:.16em; color:rgba(55,35,8,.34); margin-bottom:16px; position:relative; }
.card-wish { font-family:'Noto Serif KR',serif; font-size:clamp(17px,4vw,22px); font-weight:400; letter-spacing:.1em; color:rgba(38,22,5,.9); text-align:center; line-height:1.8; margin-bottom:18px; position:relative; }
.card-enc  { font-family:'Noto Serif KR',serif; font-size:12px; font-style:italic; letter-spacing:.12em; color:rgba(55,35,8,.42); text-align:center; line-height:1.7; position:relative; }

/* 튜토리얼 */
.tutorial {
  position:fixed; inset:0; z-index:150;
  background:rgba(0,0,0,.75);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:28px; padding:40px 32px;
  opacity:1; transition:opacity .6s ease;
  pointer-events:auto;
}
.tutorial.hide { opacity:0; pointer-events:none; }
.tut-title {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(16px,4vw,22px); font-weight:300;
  letter-spacing:.16em; color:rgba(255,255,255,.8);
  text-align:center; line-height:1.6;
}
.tut-items { display:flex; flex-direction:column; gap:18px; width:100%; max-width:280px; }
.tut-item { display:flex; align-items:center; gap:14px; }
.tut-icon {
  width:40px; height:40px; border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:18px;
}
.tut-text { font-family:'Noto Serif KR',serif; font-size:clamp(12px,3vw,14px); color:rgba(255,255,255,.55); letter-spacing:.08em; line-height:1.6; }
.tut-btn {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(11px,3vw,13px); letter-spacing:.2em;
  color:rgba(255,255,255,.5); background:transparent;
  border:1px solid rgba(255,255,255,.2);
  padding:10px 28px; border-radius:1px; cursor:pointer;
  transition:all .25s; margin-top:8px;
}
.tut-btn:hover { color:rgba(255,255,255,.85); border-color:rgba(255,255,255,.5); }
.loading { position:fixed; inset:0; z-index:200; background:#08060a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; transition:opacity .8s; }
.loading.hide { opacity:0; pointer-events:none; }
.loading-text { font-family:'Noto Serif KR',serif; font-size:13px; letter-spacing:.22em; color:rgba(255,255,255,.25); }
.ldots { display:flex; gap:6px; }
.ld { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.22); animation:ldot 1.4s ease-in-out infinite; }
.ld:nth-child(2){animation-delay:.2s} .ld:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.4)}}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-text">염원을 불러오는 중</div>
  <div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
</div>

<canvas id="cv"></canvas>

<div class="header">
  <div class="htitle">염원을 모은 쪽지들</div>
  <div class="hcount" id="hcount"></div>
</div>
<div class="hint" style="bottom:72px;">쪽지를 눌러 소원을 확인하세요</div>

<!-- 하단 타이포 이미지 -->
<div class="typo-bottom">
  <img src="typo.png" alt="타이포"
       onerror="this.parentElement.style.display='none'">
</div>

<div class="overlay" id="overlay" onclick="closeCard(event)">
  <div class="card" id="card">
    <div class="card-fold"></div>
    <div class="card-x">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="0" y1="0" x2="100" y2="100" stroke="rgba(75,45,10,.18)" stroke-width=".8"/>
        <line x1="100" y1="0" x2="0" y2="100" stroke="rgba(75,45,10,.18)" stroke-width=".8"/>
        <line x1="0" y1="57" x2="100" y2="57" stroke="rgba(75,45,10,.13)" stroke-width=".5"/>
      </svg>
    </div>
    <div class="card-close" onclick="forceClose()">✕</div>
    <div class="card-date" id="cdate"></div>
    <div class="card-wish" id="cwish"></div>
    <div class="card-enc"  id="cenc"></div>
  </div>
</div>

<!-- 튜토리얼 -->
<div class="tutorial" id="tutorial">
  <div class="tut-title">염원을 모은 쪽지들</div>
  <div class="tut-items">
    <div class="tut-item">
      <div class="tut-icon">👆</div>
      <div class="tut-text">쪽지를 누르면<br>소원을 확인할 수 있어요</div>
    </div>
    <div class="tut-item">
      <div class="tut-icon">📱</div>
      <div class="tut-text">폰을 기울이면<br>쪽지들이 같이 움직여요</div>
    </div>
    <div class="tut-item">
      <div class="tut-icon">🤲</div>
      <div class="tut-text">세게 흔들면<br>쪽지들이 뒤섞여요</div>
    </div>
  </div>
  <button class="tut-btn" onclick="closeTutorial()">시작하기</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0nmHdIl3uf1rArs-BPT7db8KnYmGTqRCrGryqyRShYqnesYLq5IGYGKm2f9-0DCE/exec';
const NOTE_IMG_URL = 'note.png';

const ENC = [
  '이 충전이 당신의 염원에 닿기를',
  '빛이 닿는 곳에 소원이 머뭅니다',
  '오늘의 바람이 이루어지기를',
  '당신의 염원은 이미 움직이고 있어요',
  '작은 소원 하나가 세상을 바꿉니다',
  '염원은 충전되어 다시 당신께로',
  '당신의 오늘이 빛나기를',
];

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, notes=[], t=0, hovered=-1;
let noteImg = null;
let wishes  = [];

// ── 자이로/가속도계 ───────────────────────────────────
let gravity = { x: 0, y: 0 };       // 현재 중력 방향
let lastAcc = { x: 0, y: 0, z: 0 }; // 이전 가속도
let shakeTimer = 0;                   // 흔들림 감지

function initMotion() {
  if (!window.DeviceMotionEvent) return;
  startMotion(); // 튜토리얼 버튼에서 권한 요청하므로 바로 시작
}

function startMotion() {
  window.addEventListener('devicemotion', e => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;

    const ax = acc.x || 0;
    const ay = acc.y || 0;
    const az = acc.z || 0;

    // 기울기 → 중력 방향 (부드럽게 보간)
    // ax: 왼오, ay: 앞뒤, 부호 조정
    gravity.x += (ax * 0.08 - gravity.x) * 0.15;
    gravity.y += (-ay * 0.08 - gravity.y) * 0.15;

    // 흔들림 감지 — 이전 프레임과 차이가 클 때
    const shake = Math.abs(ax - lastAcc.x) + Math.abs(ay - lastAcc.y) + Math.abs(az - lastAcc.z);
    if (shake > 18) {
      shakeTimer = 40; // 흔들림 지속 프레임
      shuffleNotes();
    }

    lastAcc = { x: ax, y: ay, z: az };
  }, { passive: true });
}

function shuffleNotes() {
  // 흔들면 각 쪽지에 랜덤 충격 가하기
  notes.forEach(n => {
    n.vx += (Math.random() - 0.5) * 6;
    n.vy += (Math.random() - 0.5) * 6;
  });
}

// ── 이미지 로드 ──────────────────────────────────────
function loadImage(src) {
  return new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => res(img);
    img.onerror = () => res(null);
    img.src = src;
  });
}

// ── 데이터 로드 ──────────────────────────────────────
async function loadWishes() {
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    wishes = (data.wishes || []).filter(w => w.wish);
  } catch(e) {
    wishes = [];
  }
  document.getElementById('hcount').textContent =
    wishes.length > 0 ? `${wishes.length}개의 염원` : '아직 소원이 없어요';
}

// ── 쪽지 배치 ────────────────────────────────────────
const SCROLL_THRESHOLD = 20; // 이 개수 이상이면 스크롤 모드

function buildNotes() {
  if (!wishes.length) return;

  const isScroll = wishes.length > SCROLL_THRESHOLD;

  if (isScroll) {
    // 스크롤 모드 — 세로로 쭉 나열, canvas 높이 늘림
    const COLS     = Math.floor(W / 160);
    const NOTE_W   = 60 + Math.random() * 15;
    const PAD_X    = 60, PAD_Y = 100;
    const colW     = (W - PAD_X * 2) / COLS;
    const totalRows= Math.ceil(wishes.length / COLS);
    const totalH   = Math.max(H, PAD_Y * 2 + totalRows * 180);

    // canvas 높이 확장
    cv.height = totalH * devicePixelRatio;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(devicePixelRatio, devicePixelRatio);
    cv.style.height = totalH + 'px';
    cv.style.position = 'absolute';
    document.body.style.overflowY = 'auto';
    document.body.style.height = totalH + 'px';

    notes = wishes.map((w, i) => {
      const nw = NOTE_W;
      const nh = nw * (noteImg ? noteImg.height/noteImg.width : 1.0);
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      return {
        wish: w,
        w: nw, h: nh,
        x: PAD_X + col * colW + colW/2 + (Math.random()-0.5)*22,
        y: PAD_Y + row * 180 + (Math.random()-0.5)*18,
        vx: 0, vy: 0,
        rot: (Math.random()-0.5)*0.45,
        fp: Math.random()*Math.PI*2,
        fs: 0.28+Math.random()*0.28,
        fa: 0.8+Math.random()*0.8,
        enc: ENC[i % ENC.length],
        scrollH: totalH,
      };
    });
    H = totalH;
  } else {
    // 일반 모드 — 자유 배치
    document.body.style.overflowY = 'hidden';
    document.body.style.height = '100%';
    cv.style.position = 'fixed';
    cv.style.height = '';
    const mg = 80;
    notes = wishes.map((w, i) => {
      const nw = 80 + Math.random() * 36;
      const nh = nw * (noteImg ? noteImg.height/noteImg.width : 1.0);
      return {
        wish: w,
        w: nw, h: nh,
        x: mg + Math.random() * (W - mg*2),
        y: mg + Math.random() * (H - mg*2),
        vx: 0, vy: 0,
        rot: (Math.random()-0.5)*0.6,
        fp: Math.random()*Math.PI*2,
        fs: 0.32+Math.random()*0.32,
        fa: 1.6+Math.random()*2.0,
        enc: ENC[i % ENC.length],
      };
    });
    separateNotes();
  }
}

// ── 물리 업데이트 ────────────────────────────────────
function updatePhysics() {
  if (shakeTimer > 0) shakeTimer--;
  const FRICTION   = 0.96;   // 마찰 줄임 (더 오래 미끄러짐)
  const GRAV_SCALE = 0.06;   // 중력 세기 살짝 올림
  const BORDER     = 60;

  const isScroll = wishes.length > SCROLL_THRESHOLD;

  notes.forEach(n => {
    n.vx += gravity.x * GRAV_SCALE;
    n.vy += gravity.y * GRAV_SCALE;
    n.vx *= FRICTION;
    n.vy *= FRICTION;
    n.x  += n.vx;
    n.y  += n.vy;

    const scrollH = isScroll ? (n.scrollH || H) : H;
    const minX = BORDER + n.w/2, maxX = W - BORDER - n.w/2;
    const minY = BORDER + n.h/2, maxY = scrollH - BORDER - n.h/2;
    if (n.x < minX) { n.x = minX; n.vx *= -0.3; }
    if (n.x > maxX) { n.x = maxX; n.vx *= -0.3; }
    if (n.y < minY) { n.y = minY; n.vy *= -0.3; }
    if (n.y > maxY) { n.y = maxY; n.vy *= -0.3; }
  });

  separateNotes(true);
}

// ── 겹침 방지 ────────────────────────────────────────
function separateNotes(soft = false) {
  const MIN_DIST_FACTOR = 0.72; // 이 비율 이하로 겹치면 밀어내기
  const PUSH = soft ? 0.4 : 1.0;

  for (let i=0; i<notes.length; i++) {
    for (let j=i+1; j<notes.length; j++) {
      const a = notes[i], b = notes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      // 두 쪽지의 평균 크기 기준 최소 거리
      const minDist = ((a.w + b.w) * 0.5 + (a.h + b.h) * 0.5) * 0.5 * MIN_DIST_FACTOR;

      if (dist < minDist && dist > 0.1) {
        const overlap = (minDist - dist) / dist * PUSH;
        const ox = dx * overlap * 0.5;
        const oy = dy * overlap * 0.5;

        if (soft) {
          // 물리 모드 — 속도로 밀어내기
          a.vx -= ox * 0.5; a.vy -= oy * 0.5;
          b.vx += ox * 0.5; b.vy += oy * 0.5;
        } else {
          // 초기 배치 — 위치 직접 조정
          a.x -= ox; a.y -= oy;
          b.x += ox; b.y += oy;
        }
      }
    }
  }
}

// ── 쪽지 그리기 ──────────────────────────────────────
function drawNote(n, hov) {
  // 물리 위치 기반 (float 효과는 살짝만)
  const fy = Math.sin(t * n.fs + n.fp) * n.fa * 0.4;
  const fx = Math.cos(t * n.fs * 0.7 + n.fp) * n.fa * 0.15;
  const sc = hov ? 1.14 : 1.0;

  if (!noteImg) return;

  ctx.save();
  ctx.translate(n.x + fx, n.y + fy);
  ctx.rotate(n.rot);
  ctx.scale(sc, sc);

  if (hov) {
    // hover시 윤곽 따라 황금빛 glow
    ctx.shadowColor   = 'rgba(255,240,150,0.7)';
    ctx.shadowBlur    = 28;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.drawImage(noteImg, -n.w/2, -n.h/2, n.w, n.h);
    ctx.shadowColor   = 'rgba(255,250,200,0.5)';
    ctx.shadowBlur    = 12;
    ctx.drawImage(noteImg, -n.w/2, -n.h/2, n.w, n.h);
  } else {
    // 일반 — 이미지 윤곽 따라 드롭 섀도우
    ctx.shadowColor   = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur    = 10;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3.5;
    ctx.drawImage(noteImg, -n.w/2, -n.h/2, n.w, n.h);
  }

  // 본체 (shadow 없이 한 번 더 그려서 선명하게)
  ctx.shadowColor = 'transparent';
  ctx.drawImage(noteImg, -n.w/2, -n.h/2, n.w, n.h);

  ctx.restore();
}

// ── 히트 테스트 ──────────────────────────────────────
function hit(n, mx, my) {
  const fy = Math.sin(t * n.fs + n.fp) * n.fa * 0.4;
  const fx = Math.cos(t * n.fs * 0.7 + n.fp) * n.fa * 0.15;
  const dx = mx - (n.x + fx), dy = my - (n.y + fy);
  const cr = Math.cos(-n.rot), sr = Math.sin(-n.rot);
  const lx = dx*cr - dy*sr, ly = dx*sr + dy*cr;
  return Math.abs(lx) < n.w/2 + 10 && Math.abs(ly) < n.h/2 + 10;
}

// ── 별 ───────────────────────────────────────────────
function drawStars() {
  for (let i=0; i<45; i++) {
    const sx = ((i*137.5)%1)*W, sy = ((i*97.3)%1)*H*0.92;
    const so = 0.04 + Math.sin(t*0.4+i)*0.03;
    ctx.fillStyle = `rgba(220,208,192,${so})`;
    ctx.beginPath(); ctx.arc(sx, sy, 0.35+(i%3)*0.2, 0, Math.PI*2); ctx.fill();
  }
}

// ── 메인 루프 ────────────────────────────────────────
function frame() {
  t += 0.006;
  updatePhysics();
  const drawH = wishes.length > SCROLL_THRESHOLD ? (notes[0]?.scrollH || H) : H;
  ctx.clearRect(0, 0, W, drawH);
  ctx.fillStyle = '#08060a'; ctx.fillRect(0, 0, W, drawH);
  drawStars();
  notes.forEach((n,i) => { if (i !== hovered) drawNote(n, false); });
  if (hovered >= 0) drawNote(notes[hovered], true);
  requestAnimationFrame(frame);
}

// ── 이벤트 ───────────────────────────────────────────
cv.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  hovered = -1;
  for (let i=notes.length-1; i>=0; i--) {
    if (hit(notes[i], mx, my)) { hovered = i; break; }
  }
  cv.style.cursor = hovered >= 0 ? 'pointer' : 'default';
});

cv.addEventListener('click', e => {
  const mx = e.clientX, my = e.clientY;
  for (let i=notes.length-1; i>=0; i--) {
    if (hit(notes[i], mx, my)) { openCard(notes[i]); return; }
  }
});

cv.addEventListener('touchend', e => {
  e.preventDefault();
  const t2 = e.changedTouches[0];
  for (let i=notes.length-1; i>=0; i--) {
    if (hit(notes[i], t2.clientX, t2.clientY)) { openCard(notes[i]); return; }
  }
});

function openCard(n) {
  document.getElementById('cdate').textContent = n.wish.timestamp || '';
  document.getElementById('cwish').textContent = n.wish.wish;
  document.getElementById('cenc').textContent  = n.enc;
  document.getElementById('overlay').classList.add('on');
}
function closeCard(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('on');
}
function forceClose() { document.getElementById('overlay').classList.remove('on'); }

function closeTutorial() {
  const tut = document.getElementById('tutorial');
  tut.classList.add('hide');
  setTimeout(() => tut.style.display='none', 600);
  // iOS 자이로 권한도 여기서 요청
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().catch(()=>{});
  }
}

// ── 리사이즈 ─────────────────────────────────────────
function resize() {
  cv.width  = window.innerWidth  * devicePixelRatio;
  cv.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W = window.innerWidth; H = window.innerHeight;
  buildNotes();
}

// ── 30초 자동 새로고침 ───────────────────────────────
setInterval(async () => {
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    const nw   = (data.wishes || []).filter(w => w.wish);
    if (nw.length !== wishes.length) {
      wishes = nw;
      document.getElementById('hcount').textContent = `${wishes.length}개의 염원`;
      buildNotes();
    }
  } catch(e) {}
}, 30000);

// ── 초기화 ───────────────────────────────────────────
async function init() {
  W = window.innerWidth; H = window.innerHeight;
  cv.width  = W * devicePixelRatio;
  cv.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  // 이미지랑 데이터 동시 로드
  [noteImg] = await Promise.all([
    loadImage(NOTE_IMG_URL),
    loadWishes(),
  ]);

  buildNotes();
  initMotion(); // 자이로스코프 시작

  const loading = document.getElementById('loading');
  loading.classList.add('hide');
  setTimeout(() => loading.style.display = 'none', 800);

  frame();
}

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
