<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>염원을 모은 쪽지들</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#08060a; font-family:'Noto Serif KR',serif; -webkit-font-smoothing:antialiased; overflow:hidden; }

/* ── 헤더 ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:20px 24px 0;
  background:linear-gradient(to bottom, #08060a 60%, transparent);
}
.htitle { font-size:14px; font-weight:300; letter-spacing:.2em; color:rgba(255,255,255,.4); }
.hcount { font-size:10px; letter-spacing:.14em; color:rgba(255,255,255,.18); margin-top:4px; }

/* ── 탭 ── */
.tabs {
  position:fixed; top:64px; left:0; right:0; z-index:50;
  display:flex; gap:0; overflow-x:auto; padding:0 20px;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
  background:linear-gradient(to bottom, #08060a 70%, transparent);
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0;
  font-family:'Noto Sans KR',sans-serif;
  font-size:12px; letter-spacing:.12em;
  color:rgba(255,255,255,.28);
  padding:8px 16px; cursor:pointer;
  border-bottom:1.5px solid transparent;
  transition:all .2s ease; white-space:nowrap;
}
.tab.active { color:rgba(255,255,255,.85); border-bottom-color:rgba(255,255,255,.5); }

/* ── 쪽지 필드 ── */
.note-scene {
  position:fixed; top:110px; left:0; right:0; bottom:64px;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.note-field {
  position:relative; width:100%;
  min-height:calc(100vh - 180px);
  padding:0 0 40px;
}
.note-item {
  position:absolute;
  cursor:pointer;
  will-change:transform;
  transition:transform .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.note-item:active { transform:scale(1.1) rotate(var(--rot)) !important; }
.note-item img { width:100%; height:100%; display:block; pointer-events:none; }
.note-fallback {
  width:100%; height:100%;
  background:#c4a466; border-radius:2px;
}

/* 빈 상태 */
.empty {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center;
  font-size:13px; letter-spacing:.2em; color:rgba(255,255,255,.18);
  line-height:2;
}

/* ── 하단 타이포 ── */
.typo-bottom {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  z-index:50; pointer-events:none; opacity:0.35;
}
.typo-bottom img { height:clamp(22px,3.5vw,40px); width:auto; display:block; }

/* ── 팝업 ── */
.overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0); display:flex;
  align-items:center; justify-content:center;
  pointer-events:none; transition:background .35s;
}
.overlay.on { background:rgba(0,0,0,.82); pointer-events:auto; }
.card {
  position:relative; width:min(320px,82vw);
  background:#c4a466; padding:38px 28px 28px;
  transform:translateY(12px) scale(.97) rotate(-1.5deg); opacity:0;
  transition:all .42s cubic-bezier(.16,1,.3,1);
  box-shadow:4px 8px 32px rgba(0,0,0,.7);
}
.overlay.on .card { transform:rotate(-1.5deg) scale(1); opacity:1; }
.card::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(0,0,0,.04) 26px,rgba(0,0,0,.04) 27px);
  pointer-events:none;
}
.card-fold { position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 24px 24px 0; border-color:transparent rgba(0,0,0,.2) transparent transparent; }
.card-close { position:absolute; top:10px; right:12px; font-size:14px; color:rgba(55,35,8,.32); cursor:pointer; font-family:sans-serif; z-index:1; padding:4px; }
.card-date { font-family:'Noto Sans KR',sans-serif; font-size:9px; letter-spacing:.16em; color:rgba(55,35,8,.34); margin-bottom:14px; }
.card-wish { font-family:'Noto Serif KR',serif; font-size:clamp(16px,4vw,22px); font-weight:400; letter-spacing:.1em; color:rgba(38,22,5,.9); text-align:center; line-height:1.8; margin-bottom:16px; }
.card-enc  { font-family:'Noto Serif KR',serif; font-size:12px; font-style:italic; letter-spacing:.12em; color:rgba(55,35,8,.42); text-align:center; line-height:1.7; }

/* ── 튜토리얼 ── */
.tutorial {
  position:fixed; inset:0; z-index:150;
  background:rgba(0,0,0,.8); display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px; padding:40px 32px;
  transition:opacity .6s ease;
}
.tutorial.hide { opacity:0; pointer-events:none; }
.tut-title { font-size:clamp(15px,4vw,20px); font-weight:300; letter-spacing:.16em; color:rgba(255,255,255,.8); text-align:center; line-height:1.6; }
.tut-items { display:flex; flex-direction:column; gap:16px; width:100%; max-width:260px; }
.tut-item { display:flex; align-items:center; gap:12px; }
.tut-icon { width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
.tut-text { font-size:clamp(11px,3vw,13px); color:rgba(255,255,255,.5); letter-spacing:.08em; line-height:1.6; }
.tut-btn { font-size:12px; letter-spacing:.2em; color:rgba(255,255,255,.5); background:transparent; border:1px solid rgba(255,255,255,.2); padding:10px 28px; border-radius:1px; cursor:pointer; margin-top:4px; }

/* ── 로딩 ── */
.loading { position:fixed; inset:0; z-index:200; background:#08060a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; transition:opacity .8s; }
.loading.hide { opacity:0; pointer-events:none; }
.loading-text { font-size:12px; letter-spacing:.22em; color:rgba(255,255,255,.22); }
.ldots { display:flex; gap:6px; }
.ld { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.2); animation:ldot 1.4s ease-in-out infinite; }
.ld:nth-child(2){animation-delay:.2s} .ld:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.4)}}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-text">염원을 불러오는 중</div>
  <div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
</div>

<div class="header">
  <div class="htitle">염원을 모은 쪽지들</div>
  <div class="hcount" id="hcount"></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="note-scene" id="note-scene">
  <div class="note-field" id="note-field"></div>
</div>

<div class="typo-bottom">
  <img src="typo.png" alt="" onerror="this.parentElement.style.display='none'">
</div>

<div class="overlay" id="overlay" onclick="closeCard(event)">
  <div class="card" id="card">
    <div class="card-fold"></div>
    <div class="card-close" onclick="forceClose()">✕</div>
    <div class="card-date" id="cdate"></div>
    <div class="card-wish" id="cwish"></div>
    <div class="card-enc"  id="cenc"></div>
  </div>
</div>

<div class="tutorial" id="tutorial">
  <div class="tut-title">염원을 모은 쪽지들</div>
  <div class="tut-items">
    <div class="tut-item">
      <div class="tut-icon">👆</div>
      <div class="tut-text">쪽지를 누르면<br>소원을 확인할 수 있어요</div>
    </div>
    <div class="tut-item">
      <div class="tut-icon">📱</div>
      <div class="tut-text">폰을 기울이면<br>쪽지들이 움직여요</div>
    </div>
  </div>
  <button class="tut-btn" onclick="closeTutorial()">시작하기</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0nmHdIl3uf1rArs-BPT7db8KnYmGTqRCrGryqyRShYqnesYLq5IGYGKm2f9-0DCE/exec';
const NOTE_IMG   = 'note.png';
const ENC = [
  '이 충전이 당신의 염원에 닿기를',
  '빛이 닿는 곳에 소원이 머뭅니다',
  '오늘의 바람이 이루어지기를',
  '당신의 염원은 이미 움직이고 있어요',
  '작은 소원 하나가 세상을 바꿉니다',
  '염원은 충전되어 다시 당신께로',
  '당신의 오늘이 빛나기를',
];

let wishes = [], grouped = {}, dateKeys = [];
let currentTab = null;
let noteImgLoaded = false;
let gx = 0, gy = 0; // 자이로 기울기

// ── 날짜 포맷 ──────────────────────────────────────
function parseDate(ts) {
  if (!ts) return null;
  // "2024-03-24 ..." 또는 "2024/03/24" 형식 지원
  const m = ts.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if (!m) return null;
  return `${m[1]}.${String(m[2]).padStart(2,'0')}.${String(m[3]).padStart(2,'0')}`;
}

function tabLabel(dateKey) {
  const today = new Date();
  const ty = today.getFullYear();
  const tm = String(today.getMonth()+1).padStart(2,'0');
  const td = String(today.getDate()).padStart(2,'0');
  const todayKey = `${ty}.${tm}.${td}`;

  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate()-1);
  const yy = yesterday.getFullYear();
  const ym = String(yesterday.getMonth()+1).padStart(2,'0');
  const yd = String(yesterday.getDate()).padStart(2,'0');
  const yestKey = `${yy}.${ym}.${yd}`;

  if (dateKey === todayKey) return '오늘';
  if (dateKey === yestKey)  return '어제';
  // MM.DD 형식으로 축약
  const parts = dateKey.split('.');
  return `${parts[1]}.${parts[2]}`;
}

// ── 데이터 로드 ────────────────────────────────────
async function loadWishes() {
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    wishes = (data.wishes || []).filter(w => w.wish);
  } catch(e) { wishes = []; }

  // 날짜별 그룹핑
  grouped = {};
  wishes.forEach((w, i) => {
    const d = parseDate(w.timestamp) || '날짜 없음';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push({...w, _idx: i});
  });

  // 최신 날짜 먼저
  dateKeys = Object.keys(grouped).sort((a,b) => b.localeCompare(a));

  document.getElementById('hcount').textContent =
    wishes.length > 0 ? `총 ${wishes.length}개의 염원` : '아직 소원이 없어요';

  buildTabs();
  if (dateKeys.length > 0) showTab(dateKeys[0]);
}

// ── 탭 생성 ────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  dateKeys.forEach(key => {
    const count = grouped[key].length;
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.textContent = `${tabLabel(key)} (${count})`;
    tab.onclick = () => showTab(key);
    tab.dataset.key = key;
    container.appendChild(tab);
  });
}

// ── 탭 전환 ────────────────────────────────────────
function showTab(key) {
  currentTab = key;

  // 탭 활성화
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  // 쪽지 렌더
  renderNotes(grouped[key] || []);

  // 스크롤 맨 위로
  document.getElementById('note-scene').scrollTop = 0;
}

// ── 쪽지 렌더 ──────────────────────────────────────
function renderNotes(list) {
  const field = document.getElementById('note-field');
  field.innerHTML = '';

  if (!list.length) {
    field.innerHTML = '<div class="empty">이 날의 소원이 없어요</div>';
    return;
  }

  const W = window.innerWidth;
  const COLS = Math.max(2, Math.floor(W / 130));
  const colW = W / COLS;
  const NOTE_BASE = 68;
  const ROW_H = NOTE_BASE * 1.55 + 28;
  const totalRows = Math.ceil(list.length / COLS);
  const totalH = 20 + totalRows * ROW_H + 60;
  field.style.height = totalH + 'px';

  list.forEach((w, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const size = NOTE_BASE + (Math.random()-0.5) * 20;
    const aspect = noteImgLoaded ? 1.3 : 1.3;
    const nh = size * aspect;
    const cx = col * colW + colW/2;
    const cy = 20 + row * ROW_H + ROW_H/2;
    const jx = (Math.random()-0.5) * colW * 0.5;
    const jy = (Math.random()-0.5) * 22;
    const rot = (Math.random()-0.5) * 25;

    const el = document.createElement('div');
    el.className = 'note-item';
    el.style.cssText = `
      left:${cx + jx - size/2}px;
      top:${cy + jy - nh/2}px;
      width:${size}px; height:${nh}px;
      --rot:${rot}deg;
      transform:rotate(${rot}deg) translate(${gx*12}px,${gy*12}px);
    `;

    if (noteImgLoaded) {
      const img = document.createElement('img');
      img.src = NOTE_IMG;
      el.appendChild(img);
    } else {
      const fb = document.createElement('div');
      fb.className = 'note-fallback';
      el.appendChild(fb);
    }

    el.addEventListener('click', () => openCard(w));
    field.appendChild(el);
  });
}

// ── 자이로 (CSS transform으로 가볍게) ──────────────
function initGyro() {
  if (!window.DeviceMotionEvent) return;
  window.addEventListener('devicemotion', e => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    gx += ((acc.x||0) * 0.015 - gx) * 0.1;
    gy += (-(acc.y||0) * 0.015 - gy) * 0.1;
    applyGyro();
  }, { passive:true });
}

function applyGyro() {
  document.querySelectorAll('.note-item').forEach(el => {
    const rot = parseFloat(el.style.getPropertyValue('--rot')) || 0;
    el.style.transform = `rotate(${rot}deg) translate(${gx*12}px,${gy*12}px)`;
  });
}

// ── 팝업 ───────────────────────────────────────────
function openCard(w) {
  document.getElementById('cdate').textContent = w.timestamp || '';
  document.getElementById('cwish').textContent = w.wish;
  document.getElementById('cenc').textContent  = ENC[w._idx % ENC.length];
  document.getElementById('overlay').classList.add('on');
}
function closeCard(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('on');
}
function forceClose() { document.getElementById('overlay').classList.remove('on'); }

// ── 튜토리얼 ───────────────────────────────────────
function closeTutorial() {
  const tut = document.getElementById('tutorial');
  tut.classList.add('hide');
  setTimeout(()=>tut.style.display='none', 600);
  if (typeof DeviceMotionEvent!=='undefined' &&
      typeof DeviceMotionEvent.requestPermission==='function') {
    DeviceMotionEvent.requestPermission().then(()=>initGyro()).catch(()=>{});
  } else {
    initGyro();
  }
}

// ── 30초 자동 새로고침 ─────────────────────────────
setInterval(async () => {
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    const nw   = (data.wishes||[]).filter(w=>w.wish);
    if (nw.length !== wishes.length) {
      wishes = nw;
      // 그룹 재구성
      grouped = {};
      wishes.forEach((w,i) => {
        const d = parseDate(w.timestamp)||'날짜 없음';
        if(!grouped[d]) grouped[d]=[];
        grouped[d].push({...w,_idx:i});
      });
      dateKeys = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
      document.getElementById('hcount').textContent = `총 ${wishes.length}개의 염원`;
      buildTabs();
      if (currentTab && grouped[currentTab]) showTab(currentTab);
      else if (dateKeys.length > 0) showTab(dateKeys[0]);
    }
  } catch(e) {}
}, 30000);

// ── 초기화 ─────────────────────────────────────────
async function init() {
  // note.png 로드 확인
  const img = new Image();
  img.onload = () => { noteImgLoaded = true; };
  img.src = NOTE_IMG;

  await loadWishes();

  const loading = document.getElementById('loading');
  loading.classList.add('hide');
  setTimeout(()=>loading.style.display='none', 800);
}

window.addEventListener('resize', () => {
  if (currentTab) showTab(currentTab);
});

init();
</script>
</body>
</html>
