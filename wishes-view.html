<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소원 나무</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  background: #060a0d;
  color: rgba(255,255,255,0.88);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* 헤더 */
.header {
  text-align: center;
  padding: 48px 24px 32px;
  position: relative; z-index: 2;
}
.header-label {
  font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
  margin-bottom: 14px;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 300; letter-spacing: 0.16em;
  color: rgba(255,255,255,0.88); line-height: 1.5;
}
.header-sub {
  font-size: clamp(12px, 2.5vw, 14px);
  color: rgba(255,255,255,0.32); letter-spacing: 0.18em;
  margin-top: 12px;
}
.wish-count {
  margin-top: 16px; font-size: 12px;
  color: rgba(255,255,255,0.22); letter-spacing: 0.12em;
}

/* 나무 캔버스 */
#tree-canvas {
  display: block; width: 100%;
  height: 70vh; min-height: 400px;
}

/* 소원 목록 */
.wish-list {
  max-width: 600px; margin: 0 auto;
  padding: 32px 24px 60px;
}
.wish-list-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px; letter-spacing: 0.2em;
  color: rgba(255,255,255,0.3); text-align: center;
  margin-bottom: 24px; text-transform: uppercase;
}
.wish-item {
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
  padding: 16px 0; display: flex;
  flex-direction: column; gap: 5px;
}
.wish-text {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(14px, 3.5vw, 17px);
  font-weight: 300; color: rgba(255,255,255,0.82);
  letter-spacing: 0.06em; line-height: 1.6;
}
.wish-meta {
  font-size: 11px; color: rgba(255,255,255,0.22);
  letter-spacing: 0.1em;
}

/* 로딩 */
.loading {
  text-align: center; padding: 80px 24px;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px; color: rgba(255,255,255,0.3);
  letter-spacing: 0.18em;
}
.loading-dot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; background: rgba(255,255,255,0.3);
  animation: ldot 1.4s ease-in-out infinite;
  margin: 0 3px;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }

/* 빈 상태 */
.empty {
  text-align: center; padding: 80px 24px;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px; color: rgba(255,255,255,0.3);
  letter-spacing: 0.18em; line-height: 2;
}

/* 푸터 */
.footer {
  text-align: center; padding: 20px;
  font-size: 10px; color: rgba(255,255,255,0.15);
  letter-spacing: 0.12em;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">ambient wireless charging</div>
  <div class="header-title">모든 염원이<br>이 나무에 담깁니다</div>
  <div class="header-sub">전시 참여자들의 소원을 모았어요</div>
  <div class="wish-count" id="wish-count">불러오는 중...</div>
</div>

<!-- 나무 캔버스 -->
<canvas id="tree-canvas"></canvas>

<!-- 소원 목록 -->
<div class="wish-list">
  <div class="wish-list-title">모든 소원</div>
  <div id="wish-list-body">
    <div class="loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>
</div>

<div class="footer">충전된 염원들이 여기 모입니다</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSDnap6D_g_NsNCZI3xvrODqGcIdAXNrR6pN9EIdgiflBuDUpqDhcZIKvQZNLyUTcE/exec';
const OHAENG = ['#2255CC','#CC4422','#D4B800','#E8E4DC','#1A8C3A'];
let wishes = [];
let treeAF = null;

// ── 소원 불러오기 ──────────────────────────────────────
async function loadWishes() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    wishes = (data.wishes || []).filter(w => w.wish);
  } catch (e) {
    console.warn('불러오기 실패:', e);
    wishes = [];
  }

  document.getElementById('wish-count').textContent =
    wishes.length > 0 ? `총 ${wishes.length}개의 염원` : '';

  renderList();
  startTree();
}

// ── 목록 렌더링 ──────────────────────────────────────
function renderList() {
  const body = document.getElementById('wish-list-body');
  if (wishes.length === 0) {
    body.innerHTML = '<div class="empty">아직 소원이 없어요<br>전시에 참여해보세요</div>';
    return;
  }
  body.innerHTML = [...wishes].reverse().map((w, i) => `
    <div class="wish-item">
      <div class="wish-text">${escapeHtml(w.wish)}</div>
      <div class="wish-meta">${w.timestamp || ''}</div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 소원 나무 캔버스 ─────────────────────────────────
function startTree() {
  if (treeAF) cancelAnimationFrame(treeAF);
  const canvas = document.getElementById('tree-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth  * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  const slots = makeSlots(canvas.offsetWidth, canvas.offsetHeight);
  const tags = wishes.map((w, i) => ({
    wish: w, slot: slots[i % slots.length],
    color: OHAENG[i % 5],
    born: Date.now() - (wishes.length - i) * 120,
  }));

  function frame() {
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    const t = Date.now() / 1000;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#060a0d'; ctx.fillRect(0, 0, W, H);

    // 달빛 배경
    const mg = ctx.createRadialGradient(W*.5, H*.25, 0, W*.5, H*.25, W*.4);
    mg.addColorStop(0, 'rgba(140,160,200,0.07)');
    mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);

    // 땅
    const gg = ctx.createLinearGradient(0, H*.85, 0, H);
    gg.addColorStop(0, 'rgba(18,12,5,0.9)');
    gg.addColorStop(1, 'rgba(8,5,2,1)');
    ctx.fillStyle = gg; ctx.fillRect(0, H*.85, W, H*.15);

    drawTree(ctx, W, H);
    tags.forEach(tag => {
      const age = (Date.now() - tag.born) / 1000;
      const appear = Math.min(1, age * 1.5);
      drawTag(ctx, tag, W, H, t, appear);
    });

    treeAF = requestAnimationFrame(frame);
  }
  frame();
}

function makeSlots(W, H) {
  const tx = W * 0.5;
  return [
    {bx:tx-W*.22, by:H*.32}, {bx:tx+W*.22, by:H*.32},
    {bx:tx-W*.14, by:H*.22}, {bx:tx+W*.14, by:H*.22},
    {bx:tx-W*.28, by:H*.48}, {bx:tx+W*.28, by:H*.48},
    {bx:tx-W*.30, by:H*.24}, {bx:tx+W*.30, by:H*.24},
    {bx:tx-W*.36, by:H*.36}, {bx:tx+W*.36, by:H*.36},
    {bx:tx,       by:H*.38},
    {bx:tx-W*.18, by:H*.28}, {bx:tx+W*.18, by:H*.28},
    {bx:tx-W*.08, by:H*.20}, {bx:tx+W*.08, by:H*.20},
  ];
}

function drawTree(ctx, W, H) {
  const tx = W * 0.5, base = H * 0.86;
  [[W*.028,'#1a0e04'],[W*.018,'#261508']].forEach(([lw,c]) => {
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(tx, base); ctx.lineTo(tx, H*.37); ctx.stroke();
    ctx.restore();
  });
  [
    [tx,H*.55,tx-W*.22,H*.32,W*.012],[tx,H*.55,tx+W*.22,H*.32,W*.012],
    [tx,H*.46,tx-W*.14,H*.22,W*.008],[tx,H*.46,tx+W*.14,H*.22,W*.008],
    [tx,H*.64,tx-W*.28,H*.48,W*.01], [tx,H*.64,tx+W*.28,H*.48,W*.01],
    [tx-W*.14,H*.36,tx-W*.3,H*.24,W*.006],[tx+W*.14,H*.36,tx+W*.3,H*.24,W*.006],
    [tx-W*.22,H*.44,tx-W*.36,H*.36,W*.005],[tx+W*.22,H*.44,tx+W*.36,H*.36,W*.005],
  ].forEach(([x1,y1,x2,y2,lw]) => {
    ctx.save(); ctx.strokeStyle='#261508'; ctx.lineWidth=lw*1.2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.strokeStyle='#301a08'; ctx.lineWidth=lw;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.restore();
  });
}

function drawTag(ctx, tag, W, H, t, appear) {
  const {slot, color, wish: w} = tag;
  const swing = Math.sin(t * 0.65 + slot.bx * 0.01) * 4 * appear;
  const TW = W * 0.12, TH = H * 0.08;
  const tx2 = slot.bx + swing, ty2 = slot.by + H * 0.046;

  ctx.save(); ctx.globalAlpha = 0.4 * appear;
  ctx.strokeStyle = 'rgba(180,140,80,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(slot.bx, slot.by); ctx.lineTo(tx2, ty2 - TH/2); ctx.stroke();
  ctx.restore();

  ctx.save(); ctx.globalAlpha = appear;
  ctx.translate(tx2, ty2); ctx.rotate(swing * 0.018);
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(-TW/2, -TH/2, TW, TH, 3); ctx.fill();
  ctx.fillStyle = (color==='#D4B800'||color==='#E8E4DC') ? 'rgba(28,18,6,0.9)' : 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `300 ${Math.max(10, Math.round(H*0.025))}px 'Noto Serif KR', serif`;
  const text = w.wish.length > 9 ? w.wish.slice(0,8)+'…' : w.wish;
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

loadWishes();

// 30초마다 자동 새로고침
setInterval(loadWishes, 30000);
</script>
</body>
</html>
